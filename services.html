<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Bhaironath Travels | Add Bus</title>

    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6fb;
        }

        /* ================= NAVBAR ================= */
        .topbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            position: relative;
            z-index: 1055; /* FIX: keep navbar above content */
        }

        .nav-link {
            font-weight: 600;
            color: #333 !important;
        }

        .nav-link:hover,
        .nav-link.active {
            color: #0d6efd !important;
        }

        /* FIX: dropdown should appear above form */
        .dropdown-menu {
            z-index: 1060 !important;
        }

        /* MAIN CONTENT */
        .container-fluid {
            position: relative;
            z-index: 1;
        }

        /* FORM */
        .card {
            border-radius: 16px;
        }

        .form-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<!-- ================= TOP NAVBAR ================= -->
<nav class="navbar navbar-expand-lg topbar shadow-sm px-4">

    <!-- LEFT : APP NAME -->
    <a class="navbar-brand fw-bold text-primary" href="/admin/dashboard">
        🚌 Bhaironath Travels
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="adminNav">

        <!-- RIGHT : MENU ITEMS -->
        <ul class="navbar-nav ms-auto align-items-center gap-3">

            <li class="nav-item">
                <a class="nav-link" href="/admin/dashboard">
                    <i class="bi bi-speedometer2"></i> Dashboard
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link active" href="/admin/add-bus">
                    <i class="bi bi-plus-circle"></i> Add Bus
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/admin/buses">
                    <i class="bi bi-bus-front"></i> View Buses
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/admin/bookings">
                    <i class="bi bi-receipt"></i> Bookings
                </a>
            </li>
			<li class="nav-item">
						    <a href="/admin/rent-requests" class="nav-link">
						        🚌 Rent Requests
						    </a>
						</li>
            <li class="nav-item">
                <a class="nav-link" href="/admin/users">
                    <i class="bi bi-people"></i> Users
                </a>
            </li>

            <!-- ADMIN PROFILE DROPDOWN -->
            <li class="nav-item dropdown ms-3">
                <a class="nav-link dropdown-toggle d-flex align-items-center"
                   href="#" role="button" data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle fs-4 me-1"></i>
                    <span class="fw-semibold">Admin</span>
                </a>

                <ul class="dropdown-menu dropdown-menu-end shadow">
                    <li>
                        <a class="dropdown-item" href="/admin/profile">
                            <i class="bi bi-person"></i> Profile
                        </a>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <a class="dropdown-item text-danger fw-semibold" href="/admin/logout">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </a>
                    </li>
                </ul>
            </li>

        </ul>
    </div>
</nav>

<!-- ================= MAIN CONTENT ================= -->
<div class="container-fluid mt-4">

    <!-- ================= ADD BUS FORM ================= -->
    <div class="card shadow-lg p-4">

        <h4 class="fw-bold mb-4 text-success">
            ➕ Add New Bus
        </h4>

        <form action="/admin/save-bus" method="post">

            <!-- BUS INFO -->
            <div class="form-section">
                <h6 class="fw-bold mb-3">🚌 Bus Information</h6>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="fw-semibold">Bus Name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>

                    <div class="col-md-3 mb-3">
                        <label class="fw-semibold">From City</label>
                        <input type="text" name="fromCity" class="form-control" required>
                    </div>

                    <div class="col-md-3 mb-3">
                        <label class="fw-semibold">To City</label>
                        <input type="text" name="toCity" class="form-control" required>
                    </div>
                </div>
            </div>

            <!-- TIME & PRICE -->
            <div class="form-section">
                <h6 class="fw-bold mb-3">⏰ Schedule & Price</h6>
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="fw-semibold">Departure Time</label>
                        <input type="text" name="departureTime" class="form-control" placeholder="6:45 PM">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="fw-semibold">Price (₹)</label>
                        <input type="number" name="price" class="form-control" required>
                    </div>
                </div>
            </div>

            <!-- PICKUP -->
            <div class="form-section">
                <h6 class="fw-bold mb-3">📍 Pickup Details</h6>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="fw-semibold">Pickup Point</label>
                        <input type="text" name="pickupPoint" class="form-control" placeholder="RK Ashram">
                    </div>

                    <div class="col-md-3 mb-3">
                        <label class="fw-semibold">Pickup Time</label>
                        <input type="text" name="pickupTime" class="form-control" placeholder="6:00 PM">
                    </div>
                </div>
            </div>

            <!-- DROP -->
            <div class="form-section">
                <h6 class="fw-bold mb-3">🏁 Drop Details</h6>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="fw-semibold">Drop Point</label>
                        <input type="text" name="dropPoint" class="form-control" placeholder="Private Bus Stand">
                    </div>

                    <div class="col-md-3 mb-3">
                        <label class="fw-semibold">Drop Time</label>
                        <input type="text" name="dropTime" class="form-control" placeholder="7:25 AM">
                    </div>
                </div>
            </div>

            <!-- BUTTON -->
            <div class="text-end">
                <button class="btn btn-success fw-bold px-4">
                    💾 Save Bus
                </button>
            </div>

            <!-- SUCCESS MESSAGE -->
            <p th:if="${param.success}" class="text-success fw-bold mt-3">
                ✅ Bus added successfully!
            </p>

        </form>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
